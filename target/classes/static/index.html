<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password Encryption</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{background:#0f172a;color:#e2e8f0;min-height:100vh;padding:30px}
  .card{background:#1e293b;border:1px solid #334155;border-radius:12px}
  .card-header{background:#059669;color:#fff;border-radius:12px 12px 0 0!important;font-weight:700}
  .form-control{background:#0f172a;border:1px solid #475569;color:#e2e8f0}
  .form-control:focus{background:#0f172a;color:#e2e8f0;border-color:#059669;box-shadow:none}
  table{color:#e2e8f0}thead{background:#334155}
  .nav-tabs .nav-link{color:#94a3b8;border:none}
  .nav-tabs .nav-link.active{color:#e2e8f0;background:#1e293b;border-bottom:2px solid #059669}
  .result-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;font-family:monospace;font-size:.85rem;word-break:break-all}
</style>
</head>
<body>
<div class="container" style="max-width:900px">
  <h2 class="mb-1 text-success">🔐 Password Encryption</h2>
  <p class="text-secondary mb-4">Spring Boot + BCrypt + H2 &nbsp;|&nbsp; Port 8032</p>

  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="show('register')">Register</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="show('login')">Login</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="show('validate')">Validate Password</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="show('users')">All Users</a></li>
  </ul>

  <div id="tab-register">
    <div class="card">
      <div class="card-header">Register New User</div>
      <div class="card-body">
        <input id="ru" class="form-control mb-2" placeholder="Username">
        <input id="re" class="form-control mb-2" placeholder="Email">
        <input id="rp" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn w-100" style="background:#059669;color:#fff" onclick="register()">Register &amp; Encrypt Password</button>
        <div id="rmsg" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="tab-login" style="display:none">
    <div class="card">
      <div class="card-header">Login</div>
      <div class="card-body">
        <input id="lu" class="form-control mb-2" placeholder="Username">
        <input id="lp" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn w-100" style="background:#059669;color:#fff" onclick="login()">Login</button>
        <div id="lmsg" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="tab-validate" style="display:none">
    <div class="card">
      <div class="card-header">Validate Password (BCrypt Check)</div>
      <div class="card-body">
        <input id="vu" class="form-control mb-2" placeholder="Username">
        <input id="vp" type="password" class="form-control mb-2" placeholder="Password to check">
        <button class="btn w-100" style="background:#059669;color:#fff" onclick="validate()">Validate</button>
        <div id="vmsg" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="tab-users" style="display:none">
    <div class="card">
      <div class="card-header">Registered Users</div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Created</th></tr></thead>
          <tbody id="userTbl"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const g=id=>document.getElementById(id);
function show(tab){
  ['register','login','validate','users'].forEach(t=>g('tab-'+t).style.display=t===tab?'':'none');
  document.querySelectorAll('.nav-link').forEach((el,i)=>el.classList.toggle('active',['register','login','validate','users'][i]===tab));
  if(tab==='users')loadUsers();
}

function fmt(d){return`<div class="result-box mt-2">${JSON.stringify(d,null,2)}</div>`;}

async function register(){
  const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:g('ru').value,email:g('re').value,password:g('rp').value})});
  const d=await r.json();g('rmsg').innerHTML=(d.success?'<span class="text-success">✓ Registered — password BCrypt-encrypted</span>':'<span class="text-danger">'+d.message+'</span>')+fmt(d);
}

async function login(){
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:g('lu').value,password:g('lp').value})});
  const d=await r.json();g('lmsg').innerHTML=(d.success?'<span class="text-success">✓ Login successful</span>':'<span class="text-danger">'+d.message+'</span>')+fmt(d);
}

async function validate(){
  const r=await fetch('/api/auth/validate-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:g('vu').value,password:g('vp').value})});
  const d=await r.json();g('vmsg').innerHTML=(d.valid?'<span class="text-success">✓ Password matches</span>':'<span class="text-danger">✗ Password does not match</span>')+fmt(d);
}

async function loadUsers(){
  const r=await fetch('/api/auth/users');const d=await r.json();
  const users=Array.isArray(d.users)?[...d.users]:[];
  g('userTbl').innerHTML=users.length?users.map(u=>`<tr><td>${u.id}</td><td>${u.username}</td><td>${u.email}</td><td>${new Date(u.createdAt||Date.now()).toLocaleString()}</td></tr>`).join('')
    :'<tr><td colspan="4" class="text-center text-secondary py-3">No users yet</td></tr>';
}
</script>
</body>
</html>
